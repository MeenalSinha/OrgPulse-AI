version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENV=development
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - CORS_ORIGINS=http://localhost:3000
      - SLACK_CLIENT_ID=${SLACK_CLIENT_ID:-}
      - SLACK_CLIENT_SECRET=${SLACK_CLIENT_SECRET:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MCP_MODE=${MCP_MODE:-mock}
      - DATABASE_URL=postgresql://orgpulse:orgpulse@postgres:5432/orgpulse
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-orgpulse123}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app/backend
      - ./mcp_connectors:/app/mcp_connectors
      - ./data:/app/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

  slack-app:
    build:
      context: .
      dockerfile: slack-app/Dockerfile
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN:-}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    profiles: ["slack"]  # run with: docker compose --profile slack up

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=orgpulse
      - POSTGRES_PASSWORD=orgpulse
      - POSTGRES_DB=orgpulse
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5-community
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-orgpulse123}
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
    profiles: ["graph-db"]  # run with: docker compose --profile graph-db up

volumes:
  postgres_data:
  neo4j_data:
