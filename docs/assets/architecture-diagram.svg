<svg viewBox="0 0 1000 640" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <rect width="1000" height="640" fill="#F5F6F4"/>

  <!-- Slack App -->
  <rect x="380" y="20" width="240" height="70" rx="14" fill="#2F4736"/>
  <text x="500" y="48" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="600">Slack App (Bolt)</text>
  <text x="500" y="68" text-anchor="middle" fill="#DCE6D9" font-size="11">mentions / slash cmd / home tab</text>

  <!-- Frontend -->
  <rect x="30" y="140" width="220" height="70" rx="14" fill="#FFFFFF" stroke="#3E5B45" stroke-width="2"/>
  <text x="140" y="168" text-anchor="middle" fill="#1C201D" font-size="15" font-weight="600">Frontend</text>
  <text x="140" y="188" text-anchor="middle" fill="#6B7268" font-size="11">Next.js 15 + React Flow</text>

  <!-- Backend -->
  <rect x="380" y="140" width="240" height="90" rx="14" fill="#FFFFFF" stroke="#3E5B45" stroke-width="2"/>
  <text x="500" y="168" text-anchor="middle" fill="#1C201D" font-size="15" font-weight="600">FastAPI Backend</text>
  <text x="500" y="188" text-anchor="middle" fill="#6B7268" font-size="11">routers -&gt; services -&gt; data_loader</text>
  <text x="500" y="205" text-anchor="middle" fill="#6B7268" font-size="11">graph_service / rag_service / risk_engine</text>

  <!-- MCP layer -->
  <rect x="330" y="280" width="340" height="90" rx="14" fill="#EEF2ED" stroke="#6B8F76" stroke-width="2"/>
  <text x="500" y="308" text-anchor="middle" fill="#1C201D" font-size="15" font-weight="600">MCP Connector Layer</text>
  <text x="500" y="328" text-anchor="middle" fill="#3E5B45" font-size="11">GitHub &#183; GitLab &#183; Jira &#183; Linear &#183; Azure DevOps</text>
  <text x="500" y="346" text-anchor="middle" fill="#3E5B45" font-size="11">Notion &#183; Confluence &#183; Drive &#183; Slack &#183; Calendar &#183; Figma</text>

  <!-- Data stores -->
  <rect x="60" y="420" width="180" height="60" rx="12" fill="#FFFFFF" stroke="#E6E8E3" stroke-width="2"/>
  <text x="150" y="455" text-anchor="middle" fill="#1C201D" font-size="13" font-weight="600">JSON Fixtures</text>

  <rect x="280" y="420" width="180" height="60" rx="12" fill="#FFFFFF" stroke="#E6E8E3" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="370" y="450" text-anchor="middle" fill="#6B7268" font-size="12" font-weight="600">Neo4j</text>
  <text x="370" y="466" text-anchor="middle" fill="#9AA095" font-size="10">graph store (planned)</text>

  <rect x="500" y="420" width="180" height="60" rx="12" fill="#FFFFFF" stroke="#E6E8E3" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="590" y="450" text-anchor="middle" fill="#6B7268" font-size="12" font-weight="600">PostgreSQL</text>
  <text x="590" y="466" text-anchor="middle" fill="#9AA095" font-size="10">relational store (planned)</text>

  <rect x="720" y="420" width="180" height="60" rx="12" fill="#FFFFFF" stroke="#E6E8E3" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="810" y="450" text-anchor="middle" fill="#6B7268" font-size="12" font-weight="600">pgvector / Qdrant</text>
  <text x="810" y="466" text-anchor="middle" fill="#9AA095" font-size="10">embeddings (planned)</text>

  <!-- Claude -->
  <rect x="720" y="140" width="220" height="70" rx="14" fill="#FFFFFF" stroke="#B7791F" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="830" y="168" text-anchor="middle" fill="#1C201D" font-size="14" font-weight="600">Claude (optional)</text>
  <text x="830" y="188" text-anchor="middle" fill="#B7791F" font-size="11">ANTHROPIC_API_KEY synthesis</text>

  <!-- Connections -->
  <line x1="500" y1="90" x2="500" y2="140" stroke="#6B7268" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="250" y1="175" x2="380" y2="175" stroke="#6B7268" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="500" y1="230" x2="500" y2="280" stroke="#6B7268" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="620" y1="175" x2="720" y2="175" stroke="#B7791F" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-warn)"/>
  <line x1="420" y1="370" x2="150" y2="420" stroke="#9AA095" stroke-width="2" marker-end="url(#arrow-muted)"/>
  <line x1="480" y1="370" x2="370" y2="420" stroke="#9AA095" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-muted)"/>
  <line x1="530" y1="370" x2="590" y2="420" stroke="#9AA095" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-muted)"/>
  <line x1="580" y1="370" x2="810" y2="420" stroke="#9AA095" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow-muted)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6B7268"/>
    </marker>
    <marker id="arrow-warn" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#B7791F"/>
    </marker>
    <marker id="arrow-muted" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9AA095"/>
    </marker>
  </defs>

  <text x="500" y="610" text-anchor="middle" fill="#9AA095" font-size="11">Solid = implemented and wired. Dashed = architected, swap-in ready (see docs/ARCHITECTURE.md).</text>
</svg>
