name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install backend dependencies
        run: |
          pip install -r backend/requirements.txt
          pip install pytest
      - name: Generate mock data
        run: python3 data/generate_mock_data.py
      - name: Run backend unit tests
        working-directory: backend
        run: PYTHONPATH=.. python3 -m pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
        run: npm run build

  slack-app-import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install slack-app dependencies
        run: pip install -r slack-app/requirements.txt
      - name: Byte-compile check (catches syntax errors without needing live tokens)
        run: python3 -m py_compile slack-app/*.py slack-app/handlers/*.py mcp_connectors/*.py
